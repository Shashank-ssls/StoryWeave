name: CI

on:
  push:
    branches: [main]
  pull_request:

# The light gate only (CLAUDE.md): ruff + mypy(strict) + pytest run in the .venv
# environment with NO heavy ML deps. ML-only tests use importorskip and are skipped
# here, exactly as on a local light venv. Python 3.12 is the shared floor
# (requires-python >= 3.12; mypy/ruff target py312).
jobs:
  backend:
    name: backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
